@font-face {

}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  position: relative;
  overflow: hidden;
}

.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 10px;
  background: var(--hot);
  z-index: 10;
}

/* --- Background video (clouds) --- */
.video-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
  background: #87B8D9;
}

.video-bg iframe,
.video-bg #ytplayer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: max(150vw, 266.67vh);
  height: max(150vh, 84.38vw);
  pointer-events: none;
  border: 0;
}

.video-curtain {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: linear-gradient(180deg, #6FA8C9 0%, #9CC4DD 55%, #C8DEEC 100%);
  opacity: 1;
  transition: opacity 1.6s ease-out;
  overflow: hidden;
  /* Fallback: fade after 12s in case the YouTube API never reports PLAYING */
  animation: curtain-fallback 0s linear 12s forwards;
}

.video-curtain.faded {
  opacity: 0;
  visibility: hidden;
}

.curtain-cloud {
  position: absolute;
  pointer-events: none;
  will-change: transform;
}
.curtain-cloud svg { display: block; width: 100%; height: 100%; }

.curtain-cloud-1 { top: 10%; width: 28vw; min-width: 180px; aspect-ratio: 2/1; opacity: 0.85; animation: curtain-drift 60s linear infinite; animation-delay: -15s; }
.curtain-cloud-2 { top: 26%; width: 38vw; min-width: 240px; aspect-ratio: 2/1; opacity: 0.7;  animation: curtain-drift 90s linear infinite; animation-delay: -45s; }
.curtain-cloud-3 { top: 46%; width: 22vw; min-width: 150px; aspect-ratio: 2/1; opacity: 0.9;  animation: curtain-drift 50s linear infinite; animation-delay: -8s; }
.curtain-cloud-4 { top: 62%; width: 34vw; min-width: 220px; aspect-ratio: 2/1; opacity: 0.75; animation: curtain-drift 80s linear infinite; animation-delay: -35s; }
.curtain-cloud-5 { top: 80%; width: 26vw; min-width: 170px; aspect-ratio: 2/1; opacity: 0.8;  animation: curtain-drift 70s linear infinite; animation-delay: -25s; }

@keyframes curtain-drift {
  from { transform: translateX(-40vw); }
  to   { transform: translateX(120vw); }
}

@keyframes curtain-fallback {
  to { opacity: 0; visibility: hidden; }
}

@media (prefers-reduced-motion: reduce) {
  .video-curtain { opacity: 0; visibility: hidden; }
}

.wrap {
  position: relative;
  z-index: 2;
  text-align: center;
  width: 100%;
  max-width: 100vw;
  padding: 0 8px;
}

.peace {
  /* 9vw keeps "You Found Peace" (~15 chars italic serif) safely inside even narrow viewports. */
  font-size: clamp(30px, 9vw, 96px);
  line-height: 1.05;
  letter-spacing: 0.01em;
  color: rgba(255, 255, 255, 0.92);
  font-weight: 400;
  font-style: italic;
  white-space: nowrap;
  text-shadow:
    0 2px 40px rgba(255, 255, 255, 0.25),
    0 4px 60px rgba(0, 0, 0, 0.25),
    0 1px 6px rgba(0, 0, 0, 0.35);
  animation: drift-up 9s ease-in-out infinite alternate, fade-in 2.4s ease-out;
}

.peace-sub {
  margin-top: clamp(14px, 2.5vw, 28px);
  font-size: clamp(18px, 3.4vw, 34px);
  color: rgba(255, 255, 255, 0.85);
  font-style: italic;
  letter-spacing: 0.04em;
  white-space: nowrap;
  text-shadow:
    0 2px 32px rgba(255, 255, 255, 0.2),
    0 3px 40px rgba(0, 0, 0, 0.25),
    0 1px 4px rgba(0, 0, 0, 0.3);
  animation: drift-up 11s ease-in-out infinite alternate, fade-in 3.2s ease-out 0.6s backwards;
}

@media (max-width: 380px) {
  /* Very narrow phones: shrink the title a notch more so it never clips. */
  .peace { font-size: 8vw; }
}

@keyframes drift-up {
  from { transform: translateY(6px); }
  to   { transform: translateY(-6px); }
}

@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  .peace, .peace-sub { animation: none; }
}
</style>

<script>
(function () {
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

function onYouTubeIframeAPIReady() {
  new YT.Player('ytplayer', {
    videoId: 'Y8ACyHYsb6Q',
    playerVars: {
      autoplay: 1, mute: 1, loop: 1, playlist: 'Y8ACyHYsb6Q',
      controls: 0, modestbranding: 1, playsinline: 1, rel: 0,
      disablekb: 1, iv_load_policy: 3, showinfo: 0, fs: 0
    },
    events: {
      onReady: function (e) { e.target.mute(); e.target.playVideo(); },
      onStateChange: function (e) {
        if (e.data === YT.PlayerState.PLAYING) {
          // Wait ~3.5s for any YouTube title overlay to fade out, then drop the curtain.
          setTimeout(function () {
            var c = document.getElementById('curtain');
            if (c) c.classList.add('faded');
          }, 3500);
        }
      }
    }
  });
}
</script>
