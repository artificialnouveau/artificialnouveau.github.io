<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 - You found peace</title>
<meta name="robots" content="noindex">
<style>
@font-face {
  font-family: 'Young Serif';
  src: url('/assets/fonts/YoungSerif-Regular.woff2') format('woff2'),
       url('/assets/fonts/YoungSerif-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

:root {
  --paper: #F4ECDC;
  --ink: #1F1B16;
  --ink-soft: #4A413A;
  --ink-mute: #7A6F63;
  --hot: #D94B3C;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Young Serif', Georgia, serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  cursor: url("data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2232%22%20height%3D%2232%22%20viewBox%3D%220%200%2032%2032%22%3E%3Cpath%20d%3D%22M8%2022%20C3%2022%201.5%2017%206%2015%20C4.5%2010.5%209%207.5%2013.5%2011%20C14.5%205.5%2022.5%206%2023%2012%20C28.5%2011%2030.5%2017.5%2026%2019.5%20Z%22%20fill%3D%22%23FFFFFF%22%20stroke%3D%22%231F1B16%22%20stroke-width%3D%221.6%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E") 6 14, auto;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}

.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 10px;
  background: var(--hot);
  z-index: 10;
}

/* --- Background video (clouds) --- */
.video-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
  background: #87B8D9;
}

.video-bg iframe,
.video-bg #ytplayer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: max(150vw, 266.67vh);
  height: max(150vh, 84.38vw);
  pointer-events: none;
  border: 0;
}

.video-curtain {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: linear-gradient(180deg, #6FA8C9 0%, #9CC4DD 55%, #C8DEEC 100%);
  opacity: 1;
  transition: opacity 1.6s ease-out;
  /* Fallback: fade after 12s in case the YouTube API never reports PLAYING */
  animation: curtain-fallback 0s linear 12s forwards;
}

.video-curtain.faded {
  opacity: 0;
  visibility: hidden;
}

@keyframes curtain-fallback {
  to { opacity: 0; visibility: hidden; }
}

@media (prefers-reduced-motion: reduce) {
  .video-curtain { opacity: 0; visibility: hidden; }
}

.wrap {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 880px;
  width: 100%;
}

.peace {
  font-size: clamp(40px, 9vw, 110px);
  line-height: 1.05;
  letter-spacing: 0.01em;
  color: rgba(255, 255, 255, 0.92);
  font-weight: 400;
  font-style: italic;
  white-space: nowrap;
  text-shadow:
    0 2px 40px rgba(255, 255, 255, 0.25),
    0 4px 60px rgba(0, 0, 0, 0.25),
    0 1px 6px rgba(0, 0, 0, 0.35);
  animation: drift-up 9s ease-in-out infinite alternate, fade-in 2.4s ease-out;
}

.peace-sub {
  margin-top: 28px;
  font-size: clamp(22px, 3.6vw, 38px);
  color: rgba(255, 255, 255, 0.85);
  font-style: italic;
  letter-spacing: 0.04em;
  text-shadow:
    0 2px 32px rgba(255, 255, 255, 0.2),
    0 3px 40px rgba(0, 0, 0, 0.25),
    0 1px 4px rgba(0, 0, 0, 0.3);
  animation: drift-up 11s ease-in-out infinite alternate, fade-in 3.2s ease-out 0.6s backwards;
}

@keyframes drift-up {
  from { transform: translateY(6px); }
  to   { transform: translateY(-6px); }
}

@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  .peace, .peace-sub { animation: none; }
}
</style>
</head>
<body>
<div class="top-bar"></div>

<div class="video-bg" aria-hidden="true">
  <div id="ytplayer"></div>
  <div class="video-curtain" id="curtain"></div>
</div>

<div class="wrap">
  <h1 class="peace">You Found Peace</h1>
  <p class="peace-sub">Savour It</p>
</div>

<script>
(function () {
  var tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
})();

function onYouTubeIframeAPIReady() {
  new YT.Player('ytplayer', {
    videoId: 'Y8ACyHYsb6Q',
    playerVars: {
      autoplay: 1, mute: 1, loop: 1, playlist: 'Y8ACyHYsb6Q',
      controls: 0, modestbranding: 1, playsinline: 1, rel: 0,
      disablekb: 1, iv_load_policy: 3, showinfo: 0, fs: 0
    },
    events: {
      onReady: function (e) { e.target.mute(); e.target.playVideo(); },
      onStateChange: function (e) {
        if (e.data === YT.PlayerState.PLAYING) {
          // Wait ~3.5s for any YouTube title overlay to fade out, then drop the curtain.
          setTimeout(function () {
            var c = document.getElementById('curtain');
            if (c) c.classList.add('faded');
          }, 3500);
        }
      }
    }
  });
}
</script>
</body>
</html>
