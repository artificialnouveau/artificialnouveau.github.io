<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 - You found peace</title>
<meta name="robots" content="noindex">
<style>
@font-face {
  font-family: 'Young Serif';
  src: url('/assets/fonts/YoungSerif-Regular.woff2') format('woff2'),
       url('/assets/fonts/YoungSerif-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

:root {
  --paper: #F4ECDC;
  --ink: #1F1B16;
  --ink-soft: #4A413A;
  --ink-mute: #7A6F63;
  --hot: #D94B3C;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Young Serif', Georgia, serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><path d='M8 22 C3 22 1.5 17 6 15 C4.5 10.5 9 7.5 13.5 11 C14.5 5.5 22.5 6 23 12 C28.5 11 30.5 17.5 26 19.5 Z' fill='%23FFFFFF' stroke='%231F1B16' stroke-width='1.6' stroke-linejoin='round'/></svg>") 6 14, auto;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}

.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 10px;
  background: var(--hot);
  z-index: 10;
}

/* --- Background video (clouds) --- */
.video-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
  background: #87B8D9;
}

.video-bg iframe {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: max(150vw, 266.67vh);
  height: max(150vh, 84.38vw);
  pointer-events: none;
  border: 0;
}

.video-curtain {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: linear-gradient(180deg, #6FA8C9 0%, #9CC4DD 55%, #C8DEEC 100%);
  animation: curtain-fade 1.6s ease-out 5s forwards;
}

@keyframes curtain-fade {
  from { opacity: 1; }
  to   { opacity: 0; visibility: hidden; }
}

@media (prefers-reduced-motion: reduce) {
  .video-curtain { animation: none; opacity: 0; }
}

.wrap {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 880px;
  width: 100%;
}

.peace {
  font-size: clamp(54px, 10.5vw, 124px);
  line-height: 1.05;
  letter-spacing: 0.01em;
  color: rgba(255, 255, 255, 0.92);
  font-weight: 400;
  font-style: italic;
  text-shadow:
    0 2px 40px rgba(255, 255, 255, 0.25),
    0 4px 60px rgba(0, 0, 0, 0.25),
    0 1px 6px rgba(0, 0, 0, 0.35);
  animation: drift-up 9s ease-in-out infinite alternate, fade-in 2.4s ease-out;
}

.peace-sub {
  margin-top: 28px;
  font-size: clamp(22px, 3.6vw, 38px);
  color: rgba(255, 255, 255, 0.85);
  font-style: italic;
  letter-spacing: 0.04em;
  text-shadow:
    0 2px 32px rgba(255, 255, 255, 0.2),
    0 3px 40px rgba(0, 0, 0, 0.25),
    0 1px 4px rgba(0, 0, 0, 0.3);
  animation: drift-up 11s ease-in-out infinite alternate, fade-in 3.2s ease-out 0.6s backwards;
}

@keyframes drift-up {
  from { transform: translateY(6px); }
  to   { transform: translateY(-6px); }
}

@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@media (prefers-reduced-motion: reduce) {
  .peace, .peace-sub { animation: none; }
}
</style>
</head>
<body>
<div class="top-bar"></div>

<div class="video-bg" aria-hidden="true">
  <iframe
    src="https://www.youtube.com/embed/Y8ACyHYsb6Q?autoplay=1&mute=1&loop=1&playlist=Y8ACyHYsb6Q&controls=0&modestbranding=1&playsinline=1&rel=0&disablekb=1&iv_load_policy=3&showinfo=0&fs=0"
    title="Flying above the clouds"
    frameborder="0"
    allow="autoplay; encrypted-media; picture-in-picture"
    allowfullscreen></iframe>
  <div class="video-curtain"></div>
</div>

<div class="wrap">
  <h1 class="peace">You Found Peace</h1>
  <p class="peace-sub">Savour It</p>
</div>
</body>
</html>
