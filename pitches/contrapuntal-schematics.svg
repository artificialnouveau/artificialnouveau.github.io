<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" font-family="Inter, Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect width="1200" height="1800" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="600" y="60" fill="#ffffff" font-size="28" font-weight="bold" text-anchor="middle">THE MACHINE SAID NO — SYSTEM SCHEMATICS</text>
  <line x1="100" y1="80" x2="1100" y2="80" stroke="#444" stroke-width="1"/>

  <!-- ==================== SCHEMATIC 1: DATA FLOW ==================== -->
  <text x="600" y="130" fill="#cccccc" font-size="20" font-weight="bold" text-anchor="middle">SCHEMATIC 1: ALGORITHMIC DATA FLOW</text>
  <text x="600" y="155" fill="#777777" font-size="13" text-anchor="middle">How the Belastingdienst risk-classification system processed benefit applicants</text>

  <!-- INPUT LAYER -->
  <text x="150" y="200" fill="#ff6b6b" font-size="14" font-weight="bold">INPUT LAYER</text>

  <!-- Input boxes -->
  <rect x="60" y="220" width="160" height="50" rx="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="140" y="242" fill="#ff6b6b" font-size="12" text-anchor="middle">Nationality</text>
  <text x="140" y="258" fill="#ff6b6b" font-size="10" text-anchor="middle">(incl. dual nationality)</text>

  <rect x="240" y="220" width="160" height="50" rx="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="320" y="242" fill="#ff6b6b" font-size="12" text-anchor="middle">Income Data</text>
  <text x="320" y="258" fill="#ff6b6b" font-size="10" text-anchor="middle">(household, employment)</text>

  <rect x="420" y="220" width="160" height="50" rx="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="500" y="242" fill="#ff6b6b" font-size="12" text-anchor="middle">Childcare Provider</text>
  <text x="500" y="258" fill="#ff6b6b" font-size="10" text-anchor="middle">(gastouderbureau ID)</text>

  <rect x="600" y="220" width="160" height="50" rx="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="680" y="242" fill="#ff6b6b" font-size="12" text-anchor="middle">Address / Postcode</text>
  <text x="680" y="258" fill="#ff6b6b" font-size="10" text-anchor="middle">(neighbourhood risk)</text>

  <rect x="780" y="220" width="160" height="50" rx="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="860" y="242" fill="#ff6b6b" font-size="12" text-anchor="middle">Prior Claims</text>
  <text x="860" y="258" fill="#ff6b6b" font-size="10" text-anchor="middle">(correction history)</text>

  <!-- Arrows down to risk scoring -->
  <line x1="140" y1="270" x2="500" y2="330" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  <line x1="320" y1="270" x2="500" y2="330" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  <line x1="500" y1="270" x2="500" y2="330" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  <line x1="680" y1="270" x2="500" y2="330" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
  <line x1="860" y1="270" x2="500" y2="330" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>

  <!-- RISK SCORING -->
  <text x="150" y="320" fill="#ffa94d" font-size="14" font-weight="bold">DECISION LAYER</text>

  <rect x="350" y="330" width="300" height="60" rx="6" fill="#ffa94d" fill-opacity="0.15" stroke="#ffa94d" stroke-width="2"/>
  <text x="500" y="355" fill="#ffa94d" font-size="14" font-weight="bold" text-anchor="middle">RISK SCORING MODEL</text>
  <text x="500" y="375" fill="#ffa94d" font-size="11" text-anchor="middle">Weighted composite score generated</text>

  <!-- Score branches -->
  <line x1="500" y1="390" x2="300" y2="440" stroke="#ffa94d" stroke-width="1.5"/>
  <line x1="500" y1="390" x2="700" y2="440" stroke="#ffa94d" stroke-width="1.5"/>

  <!-- Low risk -->
  <rect x="200" y="440" width="200" height="45" rx="4" fill="none" stroke="#51cf66" stroke-width="1.5"/>
  <text x="300" y="460" fill="#51cf66" font-size="12" text-anchor="middle">LOW RISK</text>
  <text x="300" y="476" fill="#51cf66" font-size="10" text-anchor="middle">Benefits continue</text>

  <!-- High risk -->
  <rect x="600" y="440" width="200" height="45" rx="4" fill="none" stroke="#ff6b6b" stroke-width="2"/>
  <text x="700" y="460" fill="#ff6b6b" font-size="12" font-weight="bold" text-anchor="middle">HIGH RISK FLAG</text>
  <text x="700" y="476" fill="#ff6b6b" font-size="10" text-anchor="middle">Escalated for "fraud"</text>

  <!-- Arrow down from high risk -->
  <line x1="700" y1="485" x2="700" y2="520" stroke="#ff6b6b" stroke-width="1.5"/>
  <polygon points="695,520 705,520 700,528" fill="#ff6b6b"/>

  <!-- No human review callout -->
  <rect x="820" y="500" width="220" height="40" rx="4" fill="#ff6b6b" fill-opacity="0.1" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="930" y="517" fill="#ff6b6b" font-size="11" text-anchor="middle" font-style="italic">Often no human review</text>
  <text x="930" y="532" fill="#ff6b6b" font-size="11" text-anchor="middle" font-style="italic">at this stage</text>
  <line x1="820" y1="520" x2="760" y2="510" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- CONSEQUENCE LAYER -->
  <text x="150" y="555" fill="#e599f7" font-size="14" font-weight="bold">CONSEQUENCE LAYER</text>

  <!-- Consequence chain -->
  <rect x="560" y="535" width="280" height="40" rx="4" fill="none" stroke="#e599f7" stroke-width="1.5"/>
  <text x="700" y="555" fill="#e599f7" font-size="12" text-anchor="middle">Benefits terminated immediately</text>
  <text x="700" y="568" fill="#e599f7" font-size="10" text-anchor="middle">Full repayment demanded (EUR 10,000-80,000+)</text>

  <line x1="700" y1="575" x2="700" y2="600" stroke="#e599f7" stroke-width="1"/>
  <polygon points="695,600 705,600 700,608" fill="#e599f7"/>

  <rect x="560" y="608" width="280" height="35" rx="4" fill="none" stroke="#e599f7" stroke-width="1.5"/>
  <text x="700" y="630" fill="#e599f7" font-size="12" text-anchor="middle">Appeals rejected / ignored</text>

  <line x1="700" y1="643" x2="700" y2="665" stroke="#e599f7" stroke-width="1"/>
  <polygon points="695,665 705,665 700,673" fill="#e599f7"/>

  <!-- Human cost boxes -->
  <rect x="420" y="675" width="130" height="40" rx="4" fill="#e599f7" fill-opacity="0.12" stroke="#e599f7" stroke-width="1"/>
  <text x="485" y="695" fill="#e599f7" font-size="11" text-anchor="middle">Debt collection</text>
  <text x="485" y="708" fill="#e599f7" font-size="10" text-anchor="middle">Wage garnishment</text>

  <rect x="565" y="675" width="130" height="40" rx="4" fill="#e599f7" fill-opacity="0.12" stroke="#e599f7" stroke-width="1"/>
  <text x="630" y="695" fill="#e599f7" font-size="11" text-anchor="middle">Housing loss</text>
  <text x="630" y="708" fill="#e599f7" font-size="10" text-anchor="middle">Evictions</text>

  <rect x="710" y="675" width="130" height="40" rx="4" fill="#e599f7" fill-opacity="0.12" stroke="#e599f7" stroke-width="1"/>
  <text x="775" y="695" fill="#e599f7" font-size="11" text-anchor="middle">Family separation</text>
  <text x="775" y="708" fill="#e599f7" font-size="10" text-anchor="middle">Children in state care</text>

  <rect x="855" y="675" width="130" height="40" rx="4" fill="#e599f7" fill-opacity="0.12" stroke="#e599f7" stroke-width="1"/>
  <text x="920" y="695" fill="#e599f7" font-size="11" text-anchor="middle">Mental health</text>
  <text x="920" y="708" fill="#e599f7" font-size="10" text-anchor="middle">Suicides</text>

  <!-- Scale annotation -->
  <rect x="60" y="675" width="300" height="40" rx="4" fill="none" stroke="#777" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="210" y="695" fill="#999" font-size="12" text-anchor="middle" font-style="italic">~26,000 families affected</text>
  <text x="210" y="708" fill="#999" font-size="11" text-anchor="middle" font-style="italic">~1,675 children placed in state care</text>

  <!-- Divider -->
  <line x1="100" y1="760" x2="1100" y2="760" stroke="#333" stroke-width="1"/>

  <!-- ==================== SCHEMATIC 2: VIDEO ESSAY STRUCTURE ==================== -->
  <text x="600" y="810" fill="#cccccc" font-size="20" font-weight="bold" text-anchor="middle">SCHEMATIC 2: VIDEO ESSAY STRUCTURE</text>
  <text x="600" y="835" fill="#777777" font-size="13" text-anchor="middle">Three-act structure interleaving footage types with animated diagrams</text>

  <!-- Timeline bar -->
  <rect x="100" y="870" width="1000" height="8" rx="4" fill="#222"/>
  <rect x="100" y="870" width="300" height="8" rx="4" fill="#ff6b6b" fill-opacity="0.5"/>
  <rect x="400" y="870" width="350" height="8" rx="4" fill="#ffa94d" fill-opacity="0.5"/>
  <rect x="750" y="870" width="350" height="8" rx="4" fill="#e599f7" fill-opacity="0.5"/>

  <text x="250" y="862" fill="#ff6b6b" font-size="11" text-anchor="middle">ACT I: INPUT (0:00-4:00)</text>
  <text x="575" y="862" fill="#ffa94d" font-size="11" text-anchor="middle">ACT II: DECISION (4:00-9:00)</text>
  <text x="925" y="862" fill="#e599f7" font-size="11" text-anchor="middle">ACT III: CONSEQUENCE (9:00-14:00)</text>

  <!-- Act I details -->
  <rect x="100" y="900" width="300" height="180" rx="6" fill="#ff6b6b" fill-opacity="0.05" stroke="#ff6b6b" stroke-width="1"/>
  <text x="250" y="925" fill="#ff6b6b" font-size="13" font-weight="bold" text-anchor="middle">ACT I: THE INPUT LAYER</text>
  <text x="120" y="950" fill="#aaa" font-size="11">FOOTAGE:</text>
  <text x="120" y="968" fill="#ddd" font-size="11">- News clips: families applying</text>
  <text x="120" y="984" fill="#ddd" font-size="11">- Archival: Belastingdienst offices</text>
  <text x="120" y="1000" fill="#ddd" font-size="11">- Gastouderbureau registration</text>
  <text x="120" y="1022" fill="#aaa" font-size="11">ANIMATION:</text>
  <text x="120" y="1040" fill="#ddd" font-size="11">- Data fields filling in real-time</text>
  <text x="120" y="1056" fill="#ddd" font-size="11">- Nationality field highlighted red</text>
  <text x="120" y="1072" fill="#ddd" font-size="11">- Risk weights appearing on screen</text>

  <!-- Act II details -->
  <rect x="420" y="900" width="350" height="180" rx="6" fill="#ffa94d" fill-opacity="0.05" stroke="#ffa94d" stroke-width="1"/>
  <text x="595" y="925" fill="#ffa94d" font-size="13" font-weight="bold" text-anchor="middle">ACT II: THE DECISION LAYER</text>
  <text x="440" y="950" fill="#aaa" font-size="11">FOOTAGE:</text>
  <text x="440" y="968" fill="#ddd" font-size="11">- Parliamentary hearings (2020-21)</text>
  <text x="440" y="984" fill="#ddd" font-size="11">- Rutte III resignation footage</text>
  <text x="440" y="1000" fill="#ddd" font-size="11">- Whistleblower interviews</text>
  <text x="440" y="1022" fill="#aaa" font-size="11">ANIMATION:</text>
  <text x="440" y="1040" fill="#ddd" font-size="11">- Score threshold visualization</text>
  <text x="440" y="1056" fill="#ddd" font-size="11">- "Fraud" flag cascading through system</text>
  <text x="440" y="1072" fill="#ddd" font-size="11">- Absent human review node (empty chair)</text>

  <!-- Act III details -->
  <rect x="790" y="900" width="310" height="180" rx="6" fill="#e599f7" fill-opacity="0.05" stroke="#e599f7" stroke-width="1"/>
  <text x="945" y="925" fill="#e599f7" font-size="13" font-weight="bold" text-anchor="middle">ACT III: THE CONSEQUENCE</text>
  <text x="810" y="950" fill="#aaa" font-size="11">FOOTAGE:</text>
  <text x="810" y="968" fill="#ddd" font-size="11">- Testimony from affected families</text>
  <text x="810" y="984" fill="#ddd" font-size="11">- Protest marches / demonstrations</text>
  <text x="810" y="1000" fill="#ddd" font-size="11">- Jeugdzorg (child services) docs</text>
  <text x="810" y="1022" fill="#aaa" font-size="11">ANIMATION:</text>
  <text x="810" y="1040" fill="#ddd" font-size="11">- Debt numbers accumulating</text>
  <text x="810" y="1056" fill="#ddd" font-size="11">- Family nodes disconnecting</text>
  <text x="810" y="1072" fill="#ddd" font-size="11">- System loop: no exit, no appeal</text>

  <!-- Divider -->
  <line x1="100" y1="1120" x2="1100" y2="1120" stroke="#333" stroke-width="1"/>

  <!-- ==================== SCHEMATIC 3: FOOTAGE + ANIMATION INTERPLAY ==================== -->
  <text x="600" y="1170" fill="#cccccc" font-size="20" font-weight="bold" text-anchor="middle">SCHEMATIC 3: FOOTAGE / ANIMATION INTERPLAY</text>
  <text x="600" y="1195" fill="#777777" font-size="13" text-anchor="middle">How archival film and data visualization occupy the same frame</text>

  <!-- Frame mockup -->
  <rect x="200" y="1220" width="800" height="450" rx="8" fill="#111" stroke="#555" stroke-width="2"/>

  <!-- Video layer (background) -->
  <rect x="220" y="1240" width="760" height="320" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="600" y="1400" fill="#444" font-size="48" text-anchor="middle" font-style="italic">ARCHIVAL FOOTAGE</text>
  <text x="600" y="1430" fill="#333" font-size="14" text-anchor="middle">Parliamentary hearing / family testimony / news broadcast</text>

  <!-- Overlay: animated data flow (semi-transparent) -->
  <rect x="240" y="1260" width="300" height="200" rx="4" fill="#000" fill-opacity="0.7" stroke="#ffa94d" stroke-width="1"/>
  <text x="390" y="1285" fill="#ffa94d" font-size="12" font-weight="bold" text-anchor="middle">ANIMATED OVERLAY</text>

  <!-- Mini data flow inside overlay -->
  <rect x="270" y="1300" width="100" height="25" rx="3" fill="none" stroke="#ff6b6b" stroke-width="1"/>
  <text x="320" y="1317" fill="#ff6b6b" font-size="9" text-anchor="middle">nationality: dual</text>

  <rect x="270" y="1335" width="100" height="25" rx="3" fill="none" stroke="#ff6b6b" stroke-width="1"/>
  <text x="320" y="1352" fill="#ff6b6b" font-size="9" text-anchor="middle">income: low</text>

  <line x1="320" y1="1360" x2="320" y2="1385" stroke="#ffa94d" stroke-width="1"/>
  <polygon points="316,1385 324,1385 320,1392" fill="#ffa94d"/>

  <rect x="270" y="1395" width="100" height="25" rx="3" fill="none" stroke="#ffa94d" stroke-width="1.5"/>
  <text x="320" y="1412" fill="#ffa94d" font-size="9" text-anchor="middle">RISK: 0.87</text>

  <line x1="370" y1="1408" x2="420" y2="1408" stroke="#ff6b6b" stroke-width="1"/>
  <polygon points="420,1404 420,1412 428,1408" fill="#ff6b6b"/>

  <rect x="430" y="1395" width="80" height="25" rx="3" fill="#ff6b6b" fill-opacity="0.3" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="470" y="1412" fill="#ff6b6b" font-size="9" font-weight="bold" text-anchor="middle">FLAGGED</text>

  <!-- Label bar at bottom of frame -->
  <rect x="220" y="1575" width="760" height="80" rx="0" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="600" y="1605" fill="#999" font-size="13" text-anchor="middle">The animated data-flow overlay runs in the corner of the frame while archival footage plays,</text>
  <text x="600" y="1625" fill="#999" font-size="13" text-anchor="middle">creating a split attention between the human story and the system that produced it.</text>
  <text x="600" y="1645" fill="#999" font-size="13" text-anchor="middle">At key moments, the animation expands to fill the full frame.</text>

  <!-- Footer -->
  <text x="600" y="1780" fill="#555" font-size="12" text-anchor="middle">Ahnjili ZhuParris | The Machine Said No | Pitch Treatment for The Contrapuntal Post-Panoptics Grant</text>

</svg>
