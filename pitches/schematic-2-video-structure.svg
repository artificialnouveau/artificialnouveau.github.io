<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" font-family="Inter, Helvetica, Arial, sans-serif">

  <rect width="1200" height="900" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="600" y="55" fill="#ffffff" font-size="32" font-weight="bold" text-anchor="middle">GEEN BEZWAAR MOGELIJK</text>
  <text x="600" y="85" fill="#888" font-size="16" text-anchor="middle">No Objection Possible</text>
  <line x1="100" y1="110" x2="1100" y2="110" stroke="#444" stroke-width="1"/>

  <text x="600" y="150" fill="#cccccc" font-size="24" font-weight="bold" text-anchor="middle">SCHEMATIC 2: VIDEO ESSAY STRUCTURE</text>
  <text x="600" y="180" fill="#777777" font-size="15" text-anchor="middle">Three-act structure interleaving footage types with animated diagrams</text>

  <!-- Timeline bar -->
  <rect x="100" y="220" width="1000" height="12" rx="6" fill="#222"/>
  <rect x="100" y="220" width="300" height="12" rx="6" fill="#ff6b6b" fill-opacity="0.5"/>
  <rect x="400" y="220" width="350" height="12" rx="6" fill="#ffa94d" fill-opacity="0.5"/>
  <rect x="750" y="220" width="350" height="12" rx="6" fill="#e599f7" fill-opacity="0.5"/>

  <text x="250" y="210" fill="#ff6b6b" font-size="14" font-weight="bold" text-anchor="middle">ACT I: INPUT (0:00 - 4:00)</text>
  <text x="575" y="210" fill="#ffa94d" font-size="14" font-weight="bold" text-anchor="middle">ACT II: DECISION (4:00 - 9:00)</text>
  <text x="925" y="210" fill="#e599f7" font-size="14" font-weight="bold" text-anchor="middle">ACT III: CONSEQUENCE (9:00 - 14:00)</text>

  <!-- Act I -->
  <rect x="60" y="260" width="340" height="340" rx="8" fill="#ff6b6b" fill-opacity="0.04" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="230" y="300" fill="#ff6b6b" font-size="20" font-weight="bold" text-anchor="middle">ACT I: THE INPUT LAYER</text>

  <text x="90" y="345" fill="#aaa" font-size="16" font-weight="bold">FOOTAGE</text>
  <line x1="90" y1="355" x2="370" y2="355" stroke="#555" stroke-width="0.5"/>
  <text x="90" y="385" fill="#ddd" font-size="15">News clips: families applying</text>
  <text x="90" y="415" fill="#ddd" font-size="15">for childcare benefits</text>
  <text x="90" y="455" fill="#ddd" font-size="15">Archival: Belastingdienst</text>
  <text x="90" y="485" fill="#ddd" font-size="15">offices and service desks</text>
  <text x="90" y="525" fill="#ddd" font-size="15">Gastouderbureau registration</text>
  <text x="90" y="555" fill="#ddd" font-size="15">processes</text>


  <!-- Act II -->
  <rect x="420" y="260" width="340" height="340" rx="8" fill="#ffa94d" fill-opacity="0.04" stroke="#ffa94d" stroke-width="1.5"/>
  <text x="590" y="300" fill="#ffa94d" font-size="20" font-weight="bold" text-anchor="middle">ACT II: THE DECISION</text>

  <text x="450" y="345" fill="#aaa" font-size="16" font-weight="bold">FOOTAGE</text>
  <line x1="450" y1="355" x2="730" y2="355" stroke="#555" stroke-width="0.5"/>
  <text x="450" y="385" fill="#ddd" font-size="15">Parliamentary hearings</text>
  <text x="450" y="415" fill="#ddd" font-size="15">(2020-2021)</text>
  <text x="450" y="455" fill="#ddd" font-size="15">Rutte III resignation</text>
  <text x="450" y="485" fill="#ddd" font-size="15">footage (Jan 2021)</text>
  <text x="450" y="525" fill="#ddd" font-size="15">Whistleblower interviews</text>
  <text x="450" y="555" fill="#ddd" font-size="15">and internal documents</text>


  <!-- Act III -->
  <rect x="780" y="260" width="340" height="340" rx="8" fill="#e599f7" fill-opacity="0.04" stroke="#e599f7" stroke-width="1.5"/>
  <text x="950" y="300" fill="#e599f7" font-size="20" font-weight="bold" text-anchor="middle">ACT III: CONSEQUENCE</text>

  <text x="810" y="345" fill="#aaa" font-size="16" font-weight="bold">FOOTAGE</text>
  <line x1="810" y1="355" x2="1090" y2="355" stroke="#555" stroke-width="0.5"/>
  <text x="810" y="385" fill="#ddd" font-size="15">Testimony from affected</text>
  <text x="810" y="415" fill="#ddd" font-size="15">families</text>
  <text x="810" y="455" fill="#ddd" font-size="15">Protest marches and</text>
  <text x="810" y="485" fill="#ddd" font-size="15">demonstrations</text>
  <text x="810" y="525" fill="#ddd" font-size="15">Jeugdzorg (child services)</text>
  <text x="810" y="555" fill="#ddd" font-size="15">documentation</text>


</svg>
