<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="Inter, Helvetica, Arial, sans-serif">

  <rect width="1200" height="900" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="600" y="55" fill="#ffffff" font-size="32" font-weight="bold" text-anchor="middle">GEEN BEZWAAR MOGELIJK</text>
  <text x="600" y="85" fill="#888" font-size="16" text-anchor="middle">No Objection Possible</text>
  <line x1="100" y1="110" x2="1100" y2="110" stroke="#444" stroke-width="1"/>

  <text x="600" y="150" fill="#cccccc" font-size="24" font-weight="bold" text-anchor="middle">SCHEMATIC 3: FOOTAGE / ANIMATION INTERPLAY</text>
  <text x="600" y="180" fill="#777777" font-size="15" text-anchor="middle">How archival film and data visualization occupy the same frame</text>

  <!-- Main frame -->
  <rect x="150" y="210" width="900" height="520" rx="10" fill="#111" stroke="#555" stroke-width="2.5"/>

  <!-- Video layer -->
  <rect x="175" y="235" width="850" height="380" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <text x="600" y="420" fill="#3a3a3a" font-size="56" text-anchor="middle" font-style="italic">ARCHIVAL FOOTAGE</text>
  <text x="600" y="460" fill="#2a2a2a" font-size="18" text-anchor="middle">Parliamentary hearing / family testimony / news broadcast</text>

  <!-- Overlay panel -->
  <rect x="200" y="260" width="340" height="280" rx="6" fill="#000" fill-opacity="0.75" stroke="#ffa94d" stroke-width="1.5"/>
  <text x="370" y="295" fill="#ffa94d" font-size="16" font-weight="bold" text-anchor="middle">ANIMATED OVERLAY</text>

  <!-- Data fields -->
  <rect x="230" y="320" width="140" height="35" rx="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="300" y="343" fill="#ff6b6b" font-size="13" text-anchor="middle">nationality: dual</text>

  <rect x="390" y="320" width="130" height="35" rx="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="455" y="343" fill="#ff6b6b" font-size="13" text-anchor="middle">income: low</text>

  <rect x="230" y="370" width="140" height="35" rx="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="300" y="393" fill="#ff6b6b" font-size="13" text-anchor="middle">postcode: 3083</text>

  <rect x="390" y="370" width="130" height="35" rx="4" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="455" y="393" fill="#ff6b6b" font-size="13" text-anchor="middle">prior: 1 corr.</text>

  <!-- Arrows converging -->
  <line x1="300" y1="405" x2="370" y2="445" stroke="#ffa94d" stroke-width="1.5"/>
  <line x1="455" y1="405" x2="370" y2="445" stroke="#ffa94d" stroke-width="1.5"/>

  <!-- Risk score -->
  <rect x="300" y="445" width="140" height="40" rx="5" fill="none" stroke="#ffa94d" stroke-width="2"/>
  <text x="370" y="465" fill="#ffa94d" font-size="16" font-weight="bold" text-anchor="middle">RISK: 0.87</text>
  <text x="370" y="480" fill="#ffa94d" font-size="11" text-anchor="middle">threshold: 0.60</text>

  <!-- Arrow to flag -->
  <line x1="440" y1="465" x2="475" y2="465" stroke="#ff6b6b" stroke-width="2"/>
  <polygon points="475,458 475,472 488,465" fill="#ff6b6b"/>

  <!-- Flag -->
  <rect x="490" y="448" width="35" height="35" rx="4" fill="#ff6b6b" fill-opacity="0.4" stroke="#ff6b6b" stroke-width="2"/>
  <text x="507" y="471" fill="#ff6b6b" font-size="20" text-anchor="middle" font-weight="bold">!</text>

  <!-- Description bar -->
  <rect x="175" y="630" width="850" height="85" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="600" y="660" fill="#bbb" font-size="16" text-anchor="middle">The animated data-flow overlay runs in the corner of the frame while archival footage plays,</text>
  <text x="600" y="685" fill="#bbb" font-size="16" text-anchor="middle">creating a split attention between the human story and the system that produced it.</text>
  <text x="600" y="710" fill="#bbb" font-size="16" text-anchor="middle">At key moments, the animation expands to fill the full frame.</text>


</svg>
