<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Necromemex — System Diagram</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #e0e0e0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
.title { font-family: 'Space Mono', monospace; font-size: 14px; color: #999; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }
.caption { margin-top: 24px; font-family: 'Space Mono', monospace; font-size: 10px; color: #444; letter-spacing: 1px; text-align: center; max-width: 800px; }
</style>
</head>
<body>
  <div class="title">Necromemex — System Architecture</div>
  <svg width="1000" height="700" viewBox="0 0 1000 700" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="1000" height="700" fill="#0a0a0a"/>

    <!-- Top: The Living Person -->
    <rect x="380" y="20" width="240" height="80" rx="6" fill="#111" stroke="#4488ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="500" y="48" text-anchor="middle" font-family="Space Mono, monospace" font-size="10" fill="#4488ff" letter-spacing="2">THE LIVING PERSON</text>
    <text x="500" y="68" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#888">Limited media footprint</text>
    <text x="500" y="84" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#555">Photos, videos, personal records</text>

    <!-- Arrow down -->
    <line x1="500" y1="100" x2="500" y2="140" stroke="#ff4444" stroke-width="1"/>
    <polygon points="496,140 500,150 504,140" fill="#ff4444"/>

    <!-- Death Event -->
    <rect x="380" y="150" width="240" height="60" rx="6" fill="#1a0a0a" stroke="#ff4444" stroke-width="1.5"/>
    <text x="500" y="175" text-anchor="middle" font-family="Space Mono, monospace" font-size="11" fill="#ff4444" letter-spacing="2">DEATH EVENT</text>
    <text x="500" y="195" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#888">The person collapses into an image</text>

    <!-- Three arrows splitting -->
    <line x1="500" y1="210" x2="500" y2="240" stroke="#333" stroke-width="1"/>
    <line x1="500" y1="240" x2="160" y2="280" stroke="#333" stroke-width="1"/>
    <line x1="500" y1="240" x2="500" y2="280" stroke="#333" stroke-width="1"/>
    <line x1="500" y1="240" x2="840" y2="280" stroke="#333" stroke-width="1"/>
    <polygon points="156,277 164,283 162,275" fill="#333"/>
    <polygon points="496,280 500,290 504,280" fill="#333"/>
    <polygon points="838,275 836,283 844,277" fill="#333"/>

    <!-- Left: Martyrdom -->
    <rect x="40" y="285" width="240" height="130" rx="6" fill="#111" stroke="#ffaa00" stroke-width="1" stroke-opacity="0.4"/>
    <text x="160" y="313" text-anchor="middle" font-family="Space Mono, monospace" font-size="10" fill="#ffaa00" letter-spacing="2">MARTYRDOM</text>
    <text x="160" y="338" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#888">Canonization by allies</text>
    <text x="160" y="358" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#666">Murals, memorials, sainthood</text>
    <text x="160" y="378" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#666">AI-generated hagiography</text>
    <text x="160" y="398" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#555">Floyd murals / Kirk tributes</text>

    <!-- Center: Memetic Proliferation -->
    <rect x="330" y="285" width="340" height="130" rx="6" fill="#111" stroke="#ff4444" stroke-width="1" stroke-opacity="0.4"/>
    <text x="500" y="313" text-anchor="middle" font-family="Space Mono, monospace" font-size="10" fill="#ff4444" letter-spacing="2">NECROIMETIC PROLIFERATION</text>
    <text x="500" y="338" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#888">Memes, remixes, AI generations</text>
    <text x="500" y="358" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#666">The person becomes raw material</text>
    <text x="500" y="378" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#666">Harambe's Heaven canonizes internet folklore</text>
    <text x="500" y="398" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#555">Output volume overtakes lifetime archive</text>

    <!-- Right: Defilement -->
    <rect x="720" y="285" width="240" height="130" rx="6" fill="#111" stroke="#8844ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="840" y="313" text-anchor="middle" font-family="Space Mono, monospace" font-size="10" fill="#8844ff" letter-spacing="2">DEFILEMENT</text>
    <text x="840" y="338" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#888">Weaponization by opponents</text>
    <text x="840" y="358" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#666">Mockery, distortion, erasure</text>
    <text x="840" y="378" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#666">AI-generated defacement</text>
    <text x="840" y="398" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#555">Floyd defaced / Kirk mocked</text>

    <!-- AI Accelerant box spanning all three -->
    <rect x="40" y="440" width="920" height="50" rx="6" fill="#0d0d0d" stroke="#ff4444" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="500" y="470" text-anchor="middle" font-family="Space Mono, monospace" font-size="11" fill="#ff4444" letter-spacing="3">GENERATIVE AI ACCELERATES ALL THREE PROCESSES SIMULTANEOUSLY</text>

    <!-- Arrow down -->
    <line x1="500" y1="490" x2="500" y2="520" stroke="#333" stroke-width="1"/>
    <polygon points="496,520 500,530 504,520" fill="#333"/>

    <!-- Interactive Engine -->
    <rect x="200" y="530" width="280" height="140" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
    <text x="340" y="558" text-anchor="middle" font-family="Space Mono, monospace" font-size="10" fill="#e0e0e0" letter-spacing="2">NECROMEMEX ENGINE</text>
    <text x="340" y="583" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#888">Timeline visualization</text>
    <text x="340" y="600" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#888">Person → Death → Myth trajectory</text>
    <text x="340" y="617" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#888">Myth density measurement</text>
    <text x="340" y="634" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#888">Side-by-side subject comparison</text>
    <text x="340" y="656" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#666">Browser-based interactive</text>

    <!-- Research Output -->
    <rect x="540" y="530" width="280" height="140" rx="6" fill="#111" stroke="#22cc66" stroke-width="1" stroke-opacity="0.4"/>
    <text x="680" y="558" text-anchor="middle" font-family="Space Mono, monospace" font-size="10" fill="#22cc66" letter-spacing="2">RESEARCH OUTPUT</text>
    <rect x="560" y="572" width="240" height="26" rx="4" fill="#1a1a1a"/>
    <text x="680" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#ccc">Necroimetic density index</text>
    <rect x="560" y="604" width="240" height="26" rx="4" fill="#1a1a1a"/>
    <text x="680" y="622" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#ccc">Myth-to-person ratio per subject</text>
    <rect x="560" y="636" width="240" height="26" rx="4" fill="#1a1a1a"/>
    <text x="680" y="654" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#ccc">AI acceleration coefficient</text>

    <!-- Connecting lines from three boxes down -->
    <line x1="160" y1="415" x2="160" y2="440" stroke="#333" stroke-width="0.5"/>
    <line x1="500" y1="415" x2="500" y2="440" stroke="#333" stroke-width="0.5"/>
    <line x1="840" y1="415" x2="840" y2="440" stroke="#333" stroke-width="0.5"/>
  </svg>
  <div class="caption">Fig. 2 — System architecture. Death collapses a person into an image; that image is simultaneously martyred, proliferated, and defiled. Generative AI accelerates all three. Necromemex maps this process across subjects.</div>
</body>
</html>
