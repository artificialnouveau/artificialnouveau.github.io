name: Grants Bot

on:
  schedule:
    # Sundays at 09:00 UTC
    - cron: '0 9 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT with `workflow` scope so we can push branches that contain
          # workflow files (the default GITHUB_TOKEN can't, even when those
          # files aren't being modified). Falls back to GITHUB_TOKEN if GH_PAT
          # isn't set — but the push step will fail in that case.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet 'anthropic>=0.40' 'requests>=2.31' 'feedparser>=6.0'

      - name: Detect GH_PAT presence
        id: pat
        env:
          PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$PAT" ]; then
            echo "set=true" >> "$GITHUB_OUTPUT"
          else
            echo "set=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run grants bot
        id: bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 smalltools/grants/grants_bot.py

      # State must reach master even when no PR is opened (or a PR is closed
      # unmerged); otherwise rejected posts are re-fetched and re-extracted
      # every run and old candidates resurface as duplicates.
      - name: Commit state to master
        run: |
          set -euo pipefail
          git config user.name "grants-bot"
          git config user.email "grants-bot@users.noreply.github.com"
          git add smalltools/grants/.bot_state.json
          if git diff --cached --quiet; then
            echo "State unchanged."
          else
            git commit -m "Grants bot: update state ($(date -u +%Y-%m-%d))"
            # --autostash: grants.json may carry uncommitted candidate edits.
            git pull --rebase --autostash origin master
            git push origin HEAD:master
          fi

      - name: Regenerate feeds
        if: steps.bot.outputs.has_candidates == 'true'
        run: python3 smalltools/grants/generate_feed.py

      - name: Open draft PR
        if: ${{ steps.bot.outputs.has_candidates == 'true' && steps.pat.outputs.set == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          # Run id suffix avoids branch collisions on same-day reruns.
          BRANCH="grants-bot/${DATE}-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          # -A: generate_feed.py also rewrites index.html (JSON-LD), static
          # SEO pages, sitemap.xml, robots.txt and llms.txt; committing only
          # the feeds would leave those stale on merge.
          git add -A
          git commit -m "Grants bot: ${{ steps.bot.outputs.count }} Bluesky candidate(s) (${DATE})"
          git push -u origin "$BRANCH"
          gh pr create \
            --draft \
            --title "Grants bot: ${{ steps.bot.outputs.count }} Bluesky candidate(s) (${DATE})" \
            --body-file /tmp/pr_body.md

      - name: No candidates
        if: steps.bot.outputs.has_candidates != 'true'
        run: echo "No candidates this run; skipping PR."

      - name: PAT missing (candidates found but cannot open PR)
        if: ${{ steps.bot.outputs.has_candidates == 'true' && steps.pat.outputs.set == 'false' }}
        run: |
          echo "::warning::Found candidates but GH_PAT secret is not set."
          echo "The candidates are listed above (search for 'PR BODY' in this log)."
          echo "Add a Personal Access Token with 'workflow' scope as repo secret 'GH_PAT' to enable the draft PR step."
