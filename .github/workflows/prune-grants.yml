name: Prune old archived grants (monthly)

on:
  schedule:
    # 03:00 UTC on the 1st of every month
    - cron: '0 3 1 * *'
  # Lets you trigger it manually from the Actions tab too
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prune grants closed > 365 days ago
        run: python3 smalltools/grants/prune_grants.py --apply --auto

      - name: Regenerate feeds and calendars
        run: python3 smalltools/grants/generate_feed.py

      - name: Commit changes (if any)
        run: |
          # Ignore run-timestamp churn (RSS lastBuildDate, ICS DTSTAMP) so a
          # no-op prune doesn't produce a mislabeled monthly commit.
          if git diff -I'<lastBuildDate>' -I'^DTSTAMP:' --quiet \
             && [[ -z "$(git ls-files --others --exclude-standard)" ]]; then
            echo "Nothing to prune this month. Exiting clean."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add smalltools/grants/
          git commit -m "Auto-prune: remove grants closed > 365 days ago"
          # Retry around pushes racing the local bot / other workflows.
          for i in 1 2 3; do
            git push && break
            git pull --rebase origin master
          done
