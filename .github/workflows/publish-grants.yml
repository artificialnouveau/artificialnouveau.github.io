name: Publish queued grants (daily)

on:
  schedule:
    # 06:00 UTC every day
    - cron: '0 6 * * *'
  # Lets you trigger it manually from the Actions tab too
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Regenerate feeds, calendars and pages
        run: python3 smalltools/grants/generate_feed.py

      - name: Commit changes (if any)
        run: |
          # Every regen rewrites run timestamps (RSS lastBuildDate, ICS
          # DTSTAMP), so a plain status check always sees changes. Ignore
          # those lines; only commit when something real changed (or a new
          # untracked file appeared).
          if git diff -I'<lastBuildDate>' -I'^DTSTAMP:' --quiet \
             && [[ -z "$(git ls-files --others --exclude-standard)" ]]; then
            echo "No grants came due today. Exiting clean."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add smalltools/grants/ sitemap.xml robots.txt llms.txt
          git commit -m "Auto-publish: release grants whose addedDate came due"
          # Retry around pushes racing the local bot / other workflows.
          for i in 1 2 3; do
            git push && break
            git pull --rebase origin master
          done
