<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NT2 B1 Oefenen</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --mondrian-red: #D40920;
  --mondrian-blue: #1356A2;
  --mondrian-yellow: #F7D842;
  --mondrian-black: #000;
  --mondrian-white: #fff;
  --muted: #666;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #FAFAFA; color: #111; }

header {
  background: var(--mondrian-white);
  border-bottom: 3px solid var(--mondrian-black);
  padding: 20px 24px;
  display: flex; align-items: center; gap: 16px;
}
header h1 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
header a {
  font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--mondrian-blue); text-decoration: none;
}
header a:hover { text-decoration: underline; }

.container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

/* Subtabs */
.subtab-bar {
  display: flex; border: 2px solid var(--mondrian-black); margin-bottom: 20px;
}
.subtab-btn {
  flex: 1; padding: 12px 16px; border: none; background: var(--mondrian-white);
  font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; text-align: center; transition: background 0.15s;
}
.subtab-btn + .subtab-btn { border-left: 2px solid var(--mondrian-black); }
.subtab-btn:hover:not(.active) { background: var(--mondrian-yellow); }
.subtab-btn.active { background: var(--mondrian-red); color: #fff; }
.subtab-content { display: none; }
.subtab-content.active { display: block; }

/* Set grid */
.exam-set-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 8px; margin-bottom: 20px;
}
.exam-set-btn {
  padding: 14px 8px; border: 2px solid var(--mondrian-black); background: var(--mondrian-white);
  font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px;
  cursor: pointer; text-align: center; transition: all 0.15s;
}
.exam-set-btn:hover { background: var(--mondrian-yellow); }
.exam-set-btn.active { background: var(--mondrian-red); color: #fff; }

/* Back button */
.exam-set-select {
  padding: 10px 16px; border: 2px solid var(--mondrian-black); background: var(--mondrian-white);
  font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px;
  cursor: pointer; appearance: auto;
}

/* Category filters */
.exam-cat-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.exam-cat-filter {
  padding: 5px 12px; border: 2px solid var(--mondrian-black); background: var(--mondrian-white);
  font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer;
}
.exam-cat-filter:hover { background: var(--mondrian-yellow); }
.exam-cat-filter.active { background: var(--mondrian-red); color: #fff; }

/* Exercise cards */
.exam-exercise-list { display: flex; flex-direction: column; gap: 16px; }
.exam-exercise-card {
  border: 2px solid var(--mondrian-black); background: var(--mondrian-white);
}
.exam-exercise-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 2px solid var(--mondrian-black); background: #f5f5f5;
}
.exam-exercise-header h4 {
  font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700;
}
.exam-exercise-category {
  font-size: 11px; padding: 3px 8px; background: var(--mondrian-blue); color: #fff;
  font-family: 'Space Grotesk', sans-serif; font-weight: 600;
}
.exam-video-container { padding: 16px; }
.exam-video-link {
  display: block; position: relative; text-decoration: none; background: #000; overflow: hidden;
}
.exam-video-thumb { width: 100%; height: auto; display: block; opacity: 0.85; transition: opacity 0.2s; }
.exam-video-link:hover .exam-video-thumb { opacity: 1; }
.exam-video-play {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 64px; height: 64px; background: rgba(212,9,32,0.9); color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 28px; padding-left: 4px; transition: transform 0.2s;
}
.exam-video-link:hover .exam-video-play { transform: translate(-50%, -50%) scale(1.1); }
.exam-video-duration {
  position: absolute; bottom: 36px; right: 8px; background: rgba(0,0,0,0.8); color: #fff;
  font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; padding: 2px 6px;
}
.exam-video-bar {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: #222; color: #999; font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; padding: 10px 14px;
}
.exam-yt-link { color: #6af; text-decoration: none; font-weight: 700; font-size: 18px; }
.exam-yt-link:hover { text-decoration: underline; }

/* Transcript toggle */
.exam-transcript-toggle {
  width: 100%; padding: 10px 16px; border: none; border-top: 2px solid var(--mondrian-black);
  background: #f9f9f9; font-family: 'Space Grotesk', sans-serif; font-size: 13px;
  font-weight: 600; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px;
}
.exam-transcript-toggle:hover { background: #f0f0f0; }
.exam-transcript-toggle .arrow { transition: transform 0.2s; font-size: 11px; }
.exam-transcript-toggle.open .arrow { transform: rotate(90deg); }

/* Transcript body */
.exam-transcript-body { display: none; border-top: 1px solid #eee; }
.exam-transcript-body.open { display: flex; }
.exam-transcript-side {
  flex: 1; padding: 14px 16px; font-size: 13px; line-height: 1.7;
  font-family: 'Inter', sans-serif;
}
.exam-transcript-side:first-child { border-right: 2px solid var(--mondrian-black); }
.exam-transcript-side h5 {
  font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700;
  text-transform: uppercase; margin-bottom: 8px; color: var(--muted);
}
.exam-transcript-side.question { background: #fff; }
.exam-transcript-side.answer { background: #f0faf4; }

/* Op Niveau practice */
.on-setup { border: 2px solid var(--mondrian-black); background: var(--mondrian-white); padding: 18px; margin-bottom: 20px; }
.on-setup h3 { font-family: 'Syne', sans-serif; font-size: 20px; margin-bottom: 16px; }
.on-row { margin-bottom: 16px; }
.on-row-label {
  display: block; font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 700;
  text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.on-mode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.on-mode-btn {
  padding: 14px 12px; border: 2px solid var(--mondrian-black); background: var(--mondrian-white);
  font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px;
  cursor: pointer; text-align: left; transition: all 0.15s;
}
.on-mode-btn:hover { background: var(--mondrian-yellow); }
.on-mode-btn.active { background: var(--mondrian-red); color: #fff; }
.on-mode-btn .on-mode-sub {
  display: block; font-weight: 400; font-size: 11px; margin-top: 4px; opacity: 0.8;
  font-family: 'Inter', sans-serif;
}
.on-chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.on-chip {
  padding: 6px 12px; border: 2px solid var(--mondrian-black); background: var(--mondrian-white);
  font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer;
  user-select: none;
}
.on-chip:hover { background: var(--mondrian-yellow); }
.on-chip.active { background: var(--mondrian-blue); color: #fff; }
.on-select {
  padding: 8px 12px; border: 2px solid var(--mondrian-black); background: var(--mondrian-white);
  font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer;
}
.on-start-btn {
  padding: 14px 24px; border: 2px solid var(--mondrian-black); background: var(--mondrian-red); color: #fff;
  font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px;
  cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
}
.on-start-btn:hover { background: var(--mondrian-blue); }
.on-start-btn:disabled { background: #ccc; color: #666; cursor: not-allowed; }

.on-session { border: 2px solid var(--mondrian-black); background: var(--mondrian-white); padding: 20px; }
.on-session-top {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  margin-bottom: 18px; padding-bottom: 12px; border-bottom: 2px solid var(--mondrian-black);
  font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600;
}
.on-session-top .on-progress { color: var(--muted); }
.on-session-top .on-score { color: var(--mondrian-blue); }
.on-quit-btn {
  padding: 6px 12px; border: 2px solid var(--mondrian-black); background: var(--mondrian-white);
  font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 12px; cursor: pointer;
}
.on-quit-btn:hover { background: var(--mondrian-yellow); }

.on-prompt-word {
  font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 700;
  margin-bottom: 8px; line-height: 1.2;
}
.on-prompt-sub {
  font-family: 'Inter', sans-serif; font-size: 13px; color: var(--muted); margin-bottom: 20px;
}
.on-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.on-option-btn {
  text-align: left; padding: 14px 16px; border: 2px solid var(--mondrian-black);
  background: var(--mondrian-white); font-family: 'Inter', sans-serif; font-size: 14px;
  cursor: pointer; transition: background 0.15s;
}
.on-option-btn:hover:not(:disabled) { background: var(--mondrian-yellow); }
.on-option-btn.correct { background: #c8f0d4; border-color: #1e7e34; }
.on-option-btn.wrong { background: #f5c2c2; border-color: #b02a37; }
.on-option-btn:disabled { cursor: default; }

.on-cloze-sentence {
  font-family: 'Inter', sans-serif; font-size: 18px; line-height: 1.6;
  margin-bottom: 14px; padding: 16px; background: #f5f5f5; border-left: 4px solid var(--mondrian-blue);
}
.on-cloze-blank { display: inline-block; min-width: 80px; border-bottom: 2px solid var(--mondrian-black); padding: 0 6px; }
.on-input {
  width: 100%; padding: 12px 14px; border: 2px solid var(--mondrian-black);
  font-family: 'Inter', sans-serif; font-size: 15px; background: var(--mondrian-white);
}
.on-input:focus { outline: none; background: #fffdf0; }
.on-textarea {
  width: 100%; min-height: 100px; padding: 12px 14px; border: 2px solid var(--mondrian-black);
  font-family: 'Inter', sans-serif; font-size: 15px; resize: vertical; background: var(--mondrian-white);
}
.on-textarea:focus { outline: none; background: #fffdf0; }

.on-action-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.on-action-btn {
  padding: 10px 18px; border: 2px solid var(--mondrian-black); background: var(--mondrian-white);
  font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer;
}
.on-action-btn:hover { background: var(--mondrian-yellow); }
.on-action-btn.primary { background: var(--mondrian-red); color: #fff; }
.on-action-btn.primary:hover { background: var(--mondrian-blue); }

.on-feedback {
  margin-top: 14px; padding: 12px 16px; border: 2px solid var(--mondrian-black);
  font-family: 'Inter', sans-serif; font-size: 14px;
}
.on-feedback.ok { background: #c8f0d4; border-color: #1e7e34; }
.on-feedback.no { background: #f5c2c2; border-color: #b02a37; }
.on-feedback strong { font-family: 'Space Grotesk', sans-serif; }
.on-feedback .on-example { display: block; margin-top: 8px; font-style: italic; color: #444; }

/* Flashcard */
.on-flashcard {
  border: 2px solid var(--mondrian-black); padding: 30px 24px; min-height: 220px;
  background: var(--mondrian-white); cursor: pointer; display: flex; flex-direction: column;
  justify-content: center; text-align: center; transition: background 0.15s;
}
.on-flashcard:hover { background: #fffdf0; }
.on-flashcard.flipped { background: #eef4fb; }
.on-flashcard .on-flash-front {
  font-family: 'Syne', sans-serif; font-size: 38px; font-weight: 700;
}
.on-flashcard .on-flash-tag {
  font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: var(--muted);
  text-transform: uppercase; margin-top: 8px; letter-spacing: 0.5px;
}
.on-flashcard .on-flash-en {
  font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 14px; color: var(--mondrian-blue);
}
.on-flashcard .on-flash-note {
  font-family: 'Inter', sans-serif; font-size: 13px; color: #444; margin-bottom: 10px;
}
.on-flashcard .on-flash-example {
  font-family: 'Inter', sans-serif; font-size: 14px; font-style: italic; color: #222;
  padding-top: 10px; border-top: 1px solid #ccc;
}
.on-flashcard .on-flash-hint {
  font-family: 'Space Grotesk', sans-serif; font-size: 11px; color: var(--muted);
  margin-top: 12px; text-transform: uppercase; letter-spacing: 0.5px;
}

.on-results { text-align: center; padding: 30px 20px; }
.on-results .on-score-big {
  font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; margin-bottom: 8px;
}
.on-results .on-score-label { font-family: 'Space Grotesk', sans-serif; color: var(--muted); margin-bottom: 24px; }

@media (max-width: 600px) {
  .exam-transcript-body.open { flex-direction: column; }
  .exam-transcript-side:first-child { border-right: none; border-bottom: 2px solid var(--mondrian-black); }
  .exam-set-grid { grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); }
  header h1 { font-size: 18px; }
  .on-prompt-word { font-size: 28px; }
  .on-flashcard .on-flash-front { font-size: 30px; }
}
</style>
</head>
<body>

<header>
  <a href="index.html">&larr; Terug</a>
  <h1>NT2 B1 Oefenen</h1>
</header>

<div class="container">
  <p style="font-size:12px;color:#666;margin-bottom:12px;">Video's afkomstig van <a href="https://www.youtube.com/@AdAppeltaaltrainingen" target="_blank" rel="noopener" style="color:var(--mondrian-blue);">Ad Appel taaltrainingen</a></p>
  <div class="subtab-bar">
    <button class="subtab-btn active" data-type="spreken" onclick="switchType('spreken')">Spreken</button>
    <button class="subtab-btn" data-type="schrijven" onclick="switchType('schrijven')">Schrijven</button>
    <button class="subtab-btn" data-type="opniveau" onclick="switchType('opniveau')">Op Niveau</button>
  </div>

  <div class="subtab-content active" id="panel-spreken">
    <div id="examSprekenSets"></div>
    <div id="examSprekenExercises" style="display:none;"></div>
  </div>

  <div class="subtab-content" id="panel-schrijven">
    <div id="examSchrijvenSets"></div>
    <div id="examSchrijvenExercises" style="display:none;"></div>
  </div>

  <div class="subtab-content" id="panel-opniveau">
    <div id="onSetup"></div>
    <div id="onSession" style="display:none;"></div>
  </div>
</div>

<script>
const EXAM_CATEGORIES = {
  voorstel:    { label: 'Voorstel doen',     keywords: ['voorstel', 'stel voor', 'doe een voorstel', 'bedenk een', 'verzin een'] },
  advies:      { label: 'Advies geven',      keywords: ['advies', 'adviseer', 'raad aan', 'wat zou je', 'geef advies', 'geef uw', 'tip'] },
  mening:      { label: 'Mening geven',      keywords: ['mening', 'wat vind', 'wat denk', 'vindt u', 'eens of oneens', 'voor- en nadelen', 'liever', 'voorkeur', 'beter vind'] },
  beschrijven: { label: 'Beschrijven',       keywords: ['beschrijf', 'vertel over', 'leg uit', 'uitleggen', 'vertel wat', 'vertel hoe'] },
  klacht:      { label: 'Klacht / Probleem', keywords: ['klacht', 'klagen', 'niet tevreden', 'probleem', 'kapot', 'fout', 'stuk', 'defect'] },
  verzoek:     { label: 'Verzoek / Vragen',  keywords: ['verzoek', 'vraag of', 'wilt u', 'zou u kunnen', 'vraag aan', 'vraagt u', 'bel', 'belt u', 'schrijf een', 'schrijf een e-mail', 'mail', 'brief'] },
  informatie:  { label: 'Informatie',        keywords: ['informatie', 'informeer', 'uitleg geven', 'aanmeld', 'formulier', 'invullen'] },
  reageren:    { label: 'Reageren',          keywords: ['reageer', 'reactie', 'antwoord', 'zeg tegen', 'spreek', 'wat zeg'] },
  argumenteren:{ label: 'Argumenteren',      keywords: ['noem', 'redenen', 'reden', 'argument', 'waarom', 'onderbouw', 'twee'] },
  bedanken:    { label: 'Bedanken / Excuses', keywords: ['bedank', 'felicit', 'excus', 'sorry', 'verontschuldig'] },
  afspraken:   { label: 'Afspraken / Plannen',keywords: ['afspra', 'plan', 'organiseer', 'reserv', 'bestel', 'regel', 'uitnodig', 'afzeg', 'opzeg', 'verzet'] },
  samenwerken: { label: 'Samenwerken',       keywords: ['samenwerk', 'overleg', 'bespreek', 'collega', 'samen'] },
  kopen:       { label: 'Kopen / Bestellen', keywords: ['kopen', 'koop', 'bestellen', 'betaal', 'winkel', 'verkop'] },
  helpen:      { label: 'Hulp bieden',       keywords: ['help', 'bied aan', 'aanbied', 'vrijwillig'] },
};

function classifyExercise(questionText) {
  if (!questionText) return null;
  const lower = questionText.toLowerCase();
  for (const [key, cat] of Object.entries(EXAM_CATEGORIES)) {
    for (const kw of cat.keywords) {
      if (lower.includes(kw)) return key;
    }
  }
  return null;
}

let examTranscripts = {};
let examTimestamps = {};

function switchType(type) {
  document.querySelectorAll('.subtab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.subtab-btn[data-type="${type}"]`).classList.add('active');
  document.querySelectorAll('.subtab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('panel-' + type).classList.add('active');
}

function renderExamSets(type) {
  const containerId = type === 'spreken' ? 'examSprekenSets' : 'examSchrijvenSets';
  const container = document.getElementById(containerId);
  const data = examTranscripts[type] || {};
  let setNums = Object.keys(data).map(Number).sort((a, b) => a - b);

  if (setNums.length === 0) {
    const count = type === 'spreken' ? 30 : 33;
    setNums = Array.from({length: count}, (_, i) => i + 1);
  }

  const title = type === 'spreken' ? 'Spreken' : 'Schrijven';
  container.innerHTML = `
    <h3 style="font-family:'Syne',sans-serif;font-size:20px;margin-bottom:16px;">NT2 B1 ${title} — Kies een set</h3>
    <div class="exam-set-grid">
      ${setNums.map(n => `<button class="exam-set-btn" onclick="showExamSet('${type}',${n})">${n}</button>`).join('')}
    </div>
  `;
}

function showExamSet(type, setNum) {
  const setsEl = document.getElementById(type === 'spreken' ? 'examSprekenSets' : 'examSchrijvenSets');
  const exEl   = document.getElementById(type === 'spreken' ? 'examSprekenExercises' : 'examSchrijvenExercises');
  setsEl.style.display = 'none';
  exEl.style.display = 'block';

  const data = (examTranscripts[type] || {})[String(setNum)] || {};
  const exerciseNums = Object.keys(data).map(Number).sort((a, b) => a - b);
  const exercises = exerciseNums.length > 0 ? exerciseNums : Array.from({length: 12}, (_, i) => i + 1);

  const exerciseCats = {};
  const allCats = new Set();
  for (const n of exercises) {
    const cat = classifyExercise((data[String(n)] || {}).question);
    exerciseCats[n] = cat;
    if (cat) allCats.add(cat);
  }

  const typeLabel = type === 'spreken' ? 'Spreken' : 'Schrijven';
  const tsData = (examTimestamps[type] || {})[String(setNum)] || {};
  const ytId = tsData.youtube_id || '';
  const ytExercises = tsData.exercises || {};

  const allSets = Object.keys(examTimestamps[type] || {}).map(Number).sort((a,b) => a - b);

  exEl.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <select class="exam-set-select" onchange="if(this.value) showExamSet('${type}', parseInt(this.value))">
        ${allSets.map(n => `<option value="${n}" ${n === setNum ? 'selected' : ''}>Set ${n}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
      ${exercises.map(n => `<a href="#exam-${type}-${setNum}-${n}" class="exam-set-btn" style="padding:8px 6px;font-size:13px;min-width:36px;text-decoration:none;color:inherit;">${n}</a>`).join('')}
    </div>
    ${allCats.size > 0 ? `
      <div class="exam-cat-filters">
        <button class="exam-cat-filter active" data-cat="all" onclick="filterCat(this,'${type}')">Alles</button>
        ${[...allCats].map(c => `<button class="exam-cat-filter" data-cat="${c}" onclick="filterCat(this,'${type}')">${EXAM_CATEGORIES[c].label}</button>`).join('')}
      </div>` : ''}
    <div class="exam-exercise-list">
      ${exercises.map(n => {
        const ex = data[String(n)] || {};
        const cat = exerciseCats[n];
        const catLabel = cat ? EXAM_CATEGORIES[cat].label : '';
        const ts = ytExercises[String(n)] || {};
        const startSec = ts.start || 0;
        const endSec = ts.end || 0;
        const playerId = `yt-${type}-${setNum}-${n}`;
        const ytLink = ytId ? `https://www.youtube.com/watch?v=${ytId}&t=${startSec}` : '';
        const thumbUrl = `thumbnails/${type}_set${setNum}_ex${n}.jpg`;
        const durationMin = Math.floor((endSec - startSec) / 60);
        const durationSecRem = (endSec - startSec) % 60;
        const durationStr = endSec ? `${durationMin}:${String(durationSecRem).padStart(2,'0')}` : '';
        const question = (ex.question || '').replace(/</g, '&lt;').replace(/\n/g, '<br>');
        const answer   = (ex.answer || '').replace(/</g, '&lt;').replace(/\n/g, '<br>');
        const has = question || answer;
        return `
        <div class="exam-exercise-card" id="exam-${type}-${setNum}-${n}" data-category="${cat || 'none'}">
          <div class="exam-exercise-header">
            <h4>Opdracht ${n}</h4>
            ${catLabel ? `<span class="exam-exercise-category">${catLabel}</span>` : ''}
          </div>
          <div class="exam-video-container">
            ${ytId ? `<div class="exam-video-bar">
                <a href="${ytLink}" target="_blank" rel="noopener" class="exam-yt-link">Werkt niet? Bekijk op YouTube &#8599;</a>
                <span>${Math.floor(startSec/60)}:${String(startSec%60).padStart(2,'0')} - ${Math.floor(endSec/60)}:${String(endSec%60).padStart(2,'0')}</span>
              </div>
              <div class="exam-yt-wrapper" id="${playerId}" data-ytid="${ytId}" data-start="${startSec}" data-end="${endSec}">
              <a href="${ytLink}" target="_blank" rel="noopener" class="exam-video-link" onclick="return examPlayYT(this, '${playerId}', '${ytId}', ${startSec}, ${endSec})">
                <img src="${thumbUrl}" alt="Opdracht ${n}" class="exam-video-thumb">
                <div class="exam-video-play">&#9654;</div>
                ${durationStr ? `<span class="exam-video-duration">${durationStr}</span>` : ''}
              </a>
            </div>` : '<p style="color:#999;padding:16px;">Video niet beschikbaar</p>'}
          </div>
          ${has ? `
          <button class="exam-transcript-toggle" onclick="toggleTranscript(this)">
            <span class="arrow">&#9654;</span> Transcript
          </button>
          <div class="exam-transcript-body">
            <div class="exam-transcript-side question">
              <h5>Vraag</h5>
              ${question || '<em style="color:#999">Geen transcript</em>'}
            </div>
            <div class="exam-transcript-side answer">
              <h5>Antwoord</h5>
              ${answer || '<em style="color:#999">Geen transcript</em>'}
            </div>
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>
  `;
}

function hideExamSet(type) {
  document.getElementById(type === 'spreken' ? 'examSprekenSets' : 'examSchrijvenSets').style.display = 'block';
  document.getElementById(type === 'spreken' ? 'examSprekenExercises' : 'examSchrijvenExercises').style.display = 'none';
}

function toggleTranscript(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

function filterCat(btn, type) {
  btn.parentElement.querySelectorAll('.exam-cat-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cat = btn.dataset.cat;
  const exEl = document.getElementById(type === 'spreken' ? 'examSprekenExercises' : 'examSchrijvenExercises');
  exEl.querySelectorAll('.exam-exercise-card').forEach(card => {
    card.style.display = (cat === 'all' || card.dataset.category === cat) ? '' : 'none';
  });
}

// YouTube player: on click, replace thumbnail with iframe
function examPlayYT(anchor, containerId, videoId, startSec, endSec) {
  const wrapper = document.getElementById(containerId);
  if (!wrapper) return false;
  const linkEl = wrapper.querySelector('.exam-video-link');
  if (linkEl) {
    linkEl.outerHTML = `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;"><iframe style="position:absolute;top:0;left:0;width:100%;height:100%;" src="https://www.youtube-nocookie.com/embed/${videoId}?start=${startSec}&end=${endSec}&autoplay=1&rel=0&modestbranding=1" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>`;
  }
  return false;
}

// =========================================================================
// Op Niveau practice modes
// =========================================================================

const ON_MODES = {
  mc:    { label: 'Meerkeuze',       sub: 'Woord > betekenis (4 opties)' },
  cloze: { label: 'Invullen',        sub: 'Vul het woord in de zin in' },
  flash: { label: 'Flashcards',      sub: 'Klik om om te draaien' },
  write: { label: 'Schrijfprompts',  sub: 'Schrijf 1-2 zinnen' },
};

let onVocab = [];
let onState = {
  mode: 'mc',
  levels: new Set(['B1', 'B2']),
  tag: 'all',
  count: 15,
  direction: 'nl2en',
  queue: [],
  idx: 0,
  score: 0,
  answered: false,
};

function onShuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function onAllTags() {
  const tags = new Set();
  for (const w of onVocab) (w.tags || []).forEach(t => tags.add(t));
  return [...tags].sort();
}

function onFilteredPool() {
  return onVocab.filter(w =>
    onState.levels.has(w.level) &&
    (onState.tag === 'all' || (w.tags || []).includes(onState.tag))
  );
}

function onRenderSetup() {
  const setupEl = document.getElementById('onSetup');
  document.getElementById('onSession').style.display = 'none';
  setupEl.style.display = 'block';

  const tags = onAllTags();
  const poolSize = onFilteredPool().length;
  const maxCount = Math.min(poolSize, 50);
  const countOptions = [10, 15, 20, 30, 50].filter(n => n <= poolSize);
  if (poolSize > 0 && !countOptions.includes(poolSize) && poolSize < 10) countOptions.unshift(poolSize);

  setupEl.innerHTML = `
    <div class="on-setup">
      <h3>Op Niveau oefenen — kies een modus</h3>
      <div class="on-row">
        <span class="on-row-label">Modus</span>
        <div class="on-mode-grid">
          ${Object.entries(ON_MODES).map(([k, m]) => `
            <button class="on-mode-btn ${onState.mode === k ? 'active' : ''}" data-mode="${k}" onclick="onPickMode('${k}')">
              ${m.label}
              <span class="on-mode-sub">${m.sub}</span>
            </button>
          `).join('')}
        </div>
      </div>

      <div class="on-row">
        <span class="on-row-label">Niveau</span>
        <div class="on-chip-row">
          ${['A2', 'B1', 'B2', 'C1'].map(lvl => `
            <button class="on-chip ${onState.levels.has(lvl) ? 'active' : ''}" onclick="onToggleLevel('${lvl}')">${lvl}</button>
          `).join('')}
        </div>
      </div>

      <div class="on-row">
        <span class="on-row-label">Thema (tag)</span>
        <select class="on-select" onchange="onPickTag(this.value)">
          <option value="all" ${onState.tag === 'all' ? 'selected' : ''}>Alle thema's</option>
          ${tags.map(t => `<option value="${t}" ${onState.tag === t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
        <span style="margin-left:12px;font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--muted);">
          ${poolSize} woorden in pool
        </span>
      </div>

      ${onState.mode === 'mc' ? `
        <div class="on-row">
          <span class="on-row-label">Richting</span>
          <div class="on-chip-row">
            <button class="on-chip ${onState.direction === 'nl2en' ? 'active' : ''}" onclick="onPickDir('nl2en')">NL > EN</button>
            <button class="on-chip ${onState.direction === 'en2nl' ? 'active' : ''}" onclick="onPickDir('en2nl')">EN > NL</button>
          </div>
        </div>
      ` : ''}

      <div class="on-row">
        <span class="on-row-label">Aantal vragen</span>
        <div class="on-chip-row">
          ${countOptions.map(n => `
            <button class="on-chip ${onState.count === n ? 'active' : ''}" onclick="onPickCount(${n})">${n}</button>
          `).join('')}
        </div>
      </div>

      <button class="on-start-btn" onclick="onStart()" ${poolSize === 0 ? 'disabled' : ''}>
        Start oefening &rarr;
      </button>
    </div>
  `;
}

function onPickMode(m) { onState.mode = m; onRenderSetup(); }
function onPickTag(t)  { onState.tag = t; onRenderSetup(); }
function onPickDir(d)  { onState.direction = d; onRenderSetup(); }
function onPickCount(n) { onState.count = n; onRenderSetup(); }
function onToggleLevel(lvl) {
  if (onState.levels.has(lvl)) {
    if (onState.levels.size > 1) onState.levels.delete(lvl);
  } else {
    onState.levels.add(lvl);
  }
  onRenderSetup();
}

function onStart() {
  const pool = onFilteredPool();
  if (pool.length === 0) return;
  const n = Math.min(onState.count, pool.length);
  onState.queue = onShuffle(pool).slice(0, n);
  onState.idx = 0;
  onState.score = 0;
  onState.answered = false;
  document.getElementById('onSetup').style.display = 'none';
  document.getElementById('onSession').style.display = 'block';
  onRenderSession();
}

function onQuit() { onRenderSetup(); }

function onRenderSession() {
  const sessEl = document.getElementById('onSession');
  if (onState.idx >= onState.queue.length) {
    onRenderResults();
    return;
  }
  const total = onState.queue.length;
  const showScore = onState.mode === 'mc' || onState.mode === 'cloze';
  sessEl.innerHTML = `
    <div class="on-session">
      <div class="on-session-top">
        <span class="on-progress">${onState.idx + 1} / ${total}</span>
        ${showScore ? `<span class="on-score">Score: ${onState.score} / ${total}</span>` : '<span></span>'}
        <button class="on-quit-btn" onclick="onQuit()">Stoppen</button>
      </div>
      <div id="onSessionBody"></div>
    </div>
  `;
  const body = document.getElementById('onSessionBody');
  switch (onState.mode) {
    case 'mc':    onRenderMC(body); break;
    case 'cloze': onRenderCloze(body); break;
    case 'flash': onRenderFlash(body); break;
    case 'write': onRenderWrite(body); break;
  }
}

function onNext() {
  onState.idx++;
  onState.answered = false;
  onRenderSession();
}

function onRenderResults() {
  const showScore = onState.mode === 'mc' || onState.mode === 'cloze';
  const total = onState.queue.length;
  const pct = total > 0 ? Math.round((onState.score / total) * 100) : 0;
  document.getElementById('onSession').innerHTML = `
    <div class="on-session">
      <div class="on-results">
        ${showScore ? `
          <div class="on-score-big">${onState.score} / ${total}</div>
          <div class="on-score-label">${pct}% goed</div>
        ` : `
          <div class="on-score-big">Klaar!</div>
          <div class="on-score-label">${total} woorden geoefend</div>
        `}
        <div class="on-action-row" style="justify-content:center;">
          <button class="on-action-btn primary" onclick="onStart()">Nog een ronde</button>
          <button class="on-action-btn" onclick="onQuit()">Nieuwe oefening</button>
        </div>
      </div>
    </div>
  `;
}

// ---- Multiple choice ----
function onRenderMC(body) {
  const word = onState.queue[onState.idx];
  const pool = onFilteredPool().filter(w => w.nl !== word.nl);
  const distractors = onShuffle(pool).slice(0, 3);
  const fromKey = onState.direction === 'nl2en' ? 'nl' : 'en';
  const toKey   = onState.direction === 'nl2en' ? 'en' : 'nl';
  const options = onShuffle([word, ...distractors]);
  body.innerHTML = `
    <div class="on-prompt-word">${word[fromKey]}</div>
    <div class="on-prompt-sub">${onState.direction === 'nl2en' ? 'Wat betekent dit woord?' : 'Welk Nederlands woord betekent dit?'}</div>
    <div class="on-options">
      ${options.map((o, i) => `
        <button class="on-option-btn" data-idx="${i}" onclick="onMCAnswer(this, ${o === word ? 1 : 0})">${o[toKey]}</button>
      `).join('')}
    </div>
    <div id="onMCFeedback"></div>
  `;
}

function onMCAnswer(btn, isCorrect) {
  if (onState.answered) return;
  onState.answered = true;
  const word = onState.queue[onState.idx];
  const fb = document.getElementById('onMCFeedback');
  const btns = btn.parentElement.querySelectorAll('.on-option-btn');
  btns.forEach(b => {
    b.disabled = true;
    const correctText = onState.direction === 'nl2en' ? word.en : word.nl;
    if (b.textContent.trim() === correctText) b.classList.add('correct');
    if (b === btn && !isCorrect) b.classList.add('wrong');
  });
  if (isCorrect) onState.score++;
  fb.innerHTML = `
    <div class="on-feedback ${isCorrect ? 'ok' : 'no'}">
      <strong>${isCorrect ? 'Goed!' : 'Helaas'}</strong> &middot; ${word.nl} = ${word.en}
      ${word.note ? `<span class="on-example">${word.note}</span>` : ''}
      ${word.example ? `<span class="on-example">"${word.example}"</span>` : ''}
    </div>
    <div class="on-action-row">
      <button class="on-action-btn primary" onclick="onNext()">Volgende &rarr;</button>
    </div>
  `;
}

// ---- Cloze ----
function onBuildCloze(word) {
  const ex = word.example || '';
  const stem = word.nl.length >= 5 ? word.nl.slice(0, Math.max(4, word.nl.length - 3)) : word.nl;
  const re = new RegExp(`\\b(${stem.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\$&')}\\w*)\\b`, 'i');
  const m = ex.match(re);
  if (m) {
    return {
      before: ex.slice(0, m.index),
      hidden: m[0],
      after: ex.slice(m.index + m[0].length),
      hasBlank: true,
    };
  }
  return { before: '', hidden: word.nl, after: '', hasBlank: false, fullExample: ex };
}

function onNormalize(s) {
  return (s || '').toLowerCase().trim().replace(/[.,!?;:'"()]/g, '');
}

function onRenderCloze(body) {
  const word = onState.queue[onState.idx];
  const cloze = onBuildCloze(word);
  body.innerHTML = `
    <div class="on-prompt-sub">Vul het juiste woord in (basisvorm of vervoegd).</div>
    ${cloze.hasBlank ? `
      <div class="on-cloze-sentence">
        ${cloze.before.replace(/</g, '&lt;')}<span class="on-cloze-blank">_____</span>${cloze.after.replace(/</g, '&lt;')}
      </div>
      <div class="on-prompt-sub" style="margin-bottom:10px;"><strong>Hint:</strong> ${word.en}</div>
    ` : `
      <div class="on-cloze-sentence" style="font-style:italic;">"${(cloze.fullExample || '').replace(/</g, '&lt;')}"</div>
      <div class="on-prompt-sub" style="margin-bottom:10px;">Welk Nederlands woord betekent: <strong>${word.en}</strong>?</div>
    `}
    <input type="text" class="on-input" id="onClozeInput" autocomplete="off" autocapitalize="off" spellcheck="false"
      placeholder="Typ je antwoord..." onkeydown="if(event.key==='Enter') onClozeCheck()">
    <div id="onClozeFeedback"></div>
    <div class="on-action-row">
      <button class="on-action-btn primary" onclick="onClozeCheck()">Controleren</button>
      <button class="on-action-btn" onclick="onClozeReveal()">Ik weet het niet</button>
    </div>
  `;
  setTimeout(() => document.getElementById('onClozeInput').focus(), 50);
}

function onClozeCheck() {
  if (onState.answered) return;
  const word = onState.queue[onState.idx];
  const input = document.getElementById('onClozeInput');
  const userAns = onNormalize(input.value);
  if (!userAns) return;
  const cloze = onBuildCloze(word);
  const accepted = new Set([onNormalize(word.nl)]);
  if (cloze.hasBlank) accepted.add(onNormalize(cloze.hidden));
  const isCorrect = accepted.has(userAns) ||
    (word.nl.length >= 5 && userAns.startsWith(onNormalize(word.nl.slice(0, word.nl.length - 2))));
  onState.answered = true;
  if (isCorrect) onState.score++;
  input.disabled = true;
  document.getElementById('onClozeFeedback').innerHTML = `
    <div class="on-feedback ${isCorrect ? 'ok' : 'no'}">
      <strong>${isCorrect ? 'Goed!' : 'Niet helemaal'}</strong> &middot;
      Antwoord: <strong>${cloze.hasBlank ? cloze.hidden : word.nl}</strong> (basisvorm: ${word.nl}) = ${word.en}
      ${word.note ? `<span class="on-example">${word.note}</span>` : ''}
    </div>
    <div class="on-action-row">
      <button class="on-action-btn primary" onclick="onNext()">Volgende &rarr;</button>
    </div>
  `;
}

function onClozeReveal() {
  if (onState.answered) return;
  onState.answered = true;
  const word = onState.queue[onState.idx];
  const cloze = onBuildCloze(word);
  document.getElementById('onClozeInput').disabled = true;
  document.getElementById('onClozeFeedback').innerHTML = `
    <div class="on-feedback no">
      Antwoord: <strong>${cloze.hasBlank ? cloze.hidden : word.nl}</strong> (basisvorm: ${word.nl}) = ${word.en}
      ${word.note ? `<span class="on-example">${word.note}</span>` : ''}
    </div>
    <div class="on-action-row">
      <button class="on-action-btn primary" onclick="onNext()">Volgende &rarr;</button>
    </div>
  `;
}

// ---- Flashcards ----
function onRenderFlash(body) {
  const word = onState.queue[onState.idx];
  body.innerHTML = `
    <div class="on-flashcard" id="onFlashCard" onclick="onFlashFlip()">
      <div id="onFlashContent">
        <div class="on-flash-front">${word.nl}</div>
        <div class="on-flash-tag">${word.level || ''} ${(word.tags || []).slice(0, 2).join(' &middot; ')}</div>
        <div class="on-flash-hint">Klik om om te draaien</div>
      </div>
    </div>
    <div class="on-action-row">
      <button class="on-action-btn" onclick="onFlashFlip()">Omdraaien</button>
      <button class="on-action-btn primary" onclick="onNext()">Volgende &rarr;</button>
    </div>
  `;
}

function onFlashFlip() {
  const card = document.getElementById('onFlashCard');
  const content = document.getElementById('onFlashContent');
  const word = onState.queue[onState.idx];
  if (card.classList.contains('flipped')) {
    card.classList.remove('flipped');
    content.innerHTML = `
      <div class="on-flash-front">${word.nl}</div>
      <div class="on-flash-tag">${word.level || ''} ${(word.tags || []).slice(0, 2).join(' &middot; ')}</div>
      <div class="on-flash-hint">Klik om om te draaien</div>
    `;
  } else {
    card.classList.add('flipped');
    content.innerHTML = `
      <div class="on-flash-en">${word.en}</div>
      ${word.note ? `<div class="on-flash-note">${word.note}</div>` : ''}
      ${word.example ? `<div class="on-flash-example">"${word.example}"</div>` : ''}
    `;
  }
}

// ---- Writing prompts ----
function onRenderWrite(body) {
  const word = onState.queue[onState.idx];
  body.innerHTML = `
    <div class="on-prompt-word">${word.nl}</div>
    <div class="on-prompt-sub">
      <strong>Betekenis:</strong> ${word.en}
      ${word.note ? ` &middot; <em>${word.note}</em>` : ''}
    </div>
    <div class="on-prompt-sub" style="margin-bottom:10px;">
      Schrijf 1-2 zinnen waarin je dit woord gebruikt.
    </div>
    <textarea class="on-textarea" id="onWriteInput" placeholder="Typ hier..."></textarea>
    <div id="onWriteFeedback"></div>
    <div class="on-action-row">
      <button class="on-action-btn primary" onclick="onWriteReveal()">Toon voorbeeld</button>
      <button class="on-action-btn" onclick="onNext()">Volgende &rarr;</button>
    </div>
  `;
  setTimeout(() => document.getElementById('onWriteInput').focus(), 50);
}

function onWriteReveal() {
  const word = onState.queue[onState.idx];
  document.getElementById('onWriteFeedback').innerHTML = `
    <div class="on-feedback ok">
      <strong>Voorbeeldzin:</strong>
      <span class="on-example">"${(word.example || '').replace(/</g, '&lt;')}"</span>
    </div>
  `;
}

// Init
Promise.all([
  fetch('exercise_transcripts.json').then(r => r.json()).catch(() => ({})),
  fetch('youtube_timestamps.json').then(r => r.json()).catch(() => ({})),
  fetch('vocabulary.json').then(r => r.json()).catch(() => ([])),
]).then(([transcripts, timestamps, vocab]) => {
  examTranscripts = transcripts;
  examTimestamps = timestamps;
  onVocab = Array.isArray(vocab) ? vocab : [];
  renderExamSets('spreken');
  renderExamSets('schrijven');
  onRenderSetup();
});
